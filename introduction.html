<!doctype html>
<html>
<head>
    <title>lists</title>
</head>
<body>
    <div>
        <h1>LIST TYPES</h1>
        </div>
        <div>
            <h3>unordered list</h3>
            <ul type="square">
                <li>Introduction</li>
                <li>education</li>
                <li>hobbies</li>
            </ul>
        </div>
        <div>
            <h3>ordered list</h3>
            <ol type="A" start="3">
                <li>introduction</li>
                <li>education</li>
                <li>hobbies</li>
            </ol>
        </div>
</body>
</html>
